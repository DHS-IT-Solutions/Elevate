<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Monthly Timesheet Report</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, Helvetica, sans-serif; font-size: 11px; color: #1a1a1a; background: #fff; padding: 28px 32px; }

    /* ── Header ── */
    .page-header { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 16px; }
    .company-logo { width: 72px; height: 48px; object-fit: contain; flex-shrink: 0; }
    .header-info { flex: 1; }
    .company-name { font-size: 14px; font-weight: bold; margin-bottom: 5px; }
    .meta-block { margin-bottom: 3px; font-size: 11px; }
    .meta-block span { font-weight: bold; }
    .working-days { font-size: 11px; margin: 3px 0; }

    /* ── Titles ── */
    .report-title { text-align: center; font-size: 13px; font-weight: bold; margin: 18px 0 3px; }
    .report-subtitle { text-align: center; font-size: 11px; color: #555; margin-bottom: 18px; }

    /* ── Stats summary cards ── */
    .stats-section { margin-bottom: 20px; }
    .stats-title {
      font-size: 11px; font-weight: bold; text-transform: uppercase;
      letter-spacing: 0.5px; color: #555; margin-bottom: 8px;
      padding-bottom: 4px; border-bottom: 1px solid #e5e7eb;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      margin-bottom: 8px;
    }
    .stat-card {
      border-radius: 6px;
      padding: 8px 10px;
      border-left: 3px solid transparent;
    }
    .stat-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.4px; font-weight: 600; margin-bottom: 3px; opacity: 0.75; }
    .stat-value { font-size: 16px; font-weight: bold; line-height: 1; margin-bottom: 3px; }
    .stat-sub   { font-size: 9px; opacity: 0.7; line-height: 1.3; }

    .stat-blue   { background: #eff6ff; border-left-color: #3b82f6; color: #1e40af; }
    .stat-green  { background: #f0fdf4; border-left-color: #22c55e; color: #166534; }
    .stat-purple { background: #faf5ff; border-left-color: #a855f7; color: #6b21a8; }
    .stat-indigo { background: #eef2ff; border-left-color: #6366f1; color: #3730a3; }
    .stat-orange { background: #fff7ed; border-left-color: #f97316; color: #9a3412; }
    .stat-teal   { background: #f0fdfa; border-left-color: #14b8a6; color: #115e59; }

    .stats-note {
      font-size: 10px; color: #6b7280;
      padding: 4px 8px; background: #f9fafb;
      border-radius: 4px; margin-top: 4px;
      display: inline-block; margin-right: 6px;
    }

    /* ── Table ── */
    table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
    thead th {
      border: 1px solid #999; padding: 6px 8px; text-align: center;
      font-size: 11px; background: #f0f0f0; font-weight: bold;
    }
    thead th.date-col { text-align: left; }
    thead th.comments-col { text-align: left; width: 40%; }
    tbody td {
      border: 1px solid #ccc; padding: 5px 8px; text-align: center;
      font-size: 11px; vertical-align: top;
    }
    tbody td.date-col { text-align: left; white-space: nowrap; }
    tbody td.comments-col { text-align: left; white-space: pre-line; line-height: 1.5; }
    tbody tr:nth-child(even) { background: #fafafa; }
    tbody tr.weekend td { background: #f5f5f5; color: #aaa; }
    .status-approved  { color: #166534; font-weight: 600; }
    .status-submitted { color: #1d4ed8; font-weight: 600; }
    .status-draft     { color: #6b7280; }
    tfoot td {
      border: 1px solid #999; padding: 6px 8px; text-align: center;
      font-size: 11px; font-weight: bold; background: #f0f0f0;
    }
    tfoot td.label { text-align: left; }

    .summary-block { font-size: 11px; line-height: 1.9; }
  </style>
</head>
<body>

  <!-- Header: logo + employee info -->
  <div class="page-header">
    <img src="data:image/jpeg;base64,{{LOGO_BASE64}}" alt="Company Logo" class="company-logo" />
    <div class="header-info">
      <div class="company-name">{{COMPANY_NAME}}</div>
      <div class="meta-block">Employee: <span>{{EMPLOYEE_NAME}}</span></div>
      {{EMPLOYEE_NUMBER_ROW}}
      {{WORKING_DAYS_ROW}}
    </div>
  </div>

  <!-- Report title -->
  <div class="report-title">Monthly Timesheet Report</div>
  <div class="report-subtitle">({{PERIOD_LABEL}})</div>

  <!-- Stats summary cards -->
  {{STATS_BLOCK}}

  <!-- Timesheet table -->
  <table>
    <thead><tr>{{THEAD_ROWS}}</tr></thead>
    <tbody>{{TBODY_ROWS}}</tbody>
    <tfoot><tr>{{TFOOT_ROWS}}</tr></tfoot>
  </table>

</body>
</html>
